<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Borrow & Return Inventory</title>
<link rel="stylesheet" href="style2.css">
</head>

<body>

<div class="container">

<h1>Borrow & Return System</h1>

<h3>Add Item</h3>
<input type="text" id="itemName" placeholder="Item Name">
<input type="number" id="itemQty" placeholder="Quantity">
<button onclick="addItem()">Add Item</button>

<h3>Borrow Item</h3>
<input type="text" id="borrowName" placeholder="Item Name">
<input type="number" id="borrowQty" placeholder="Quantity">
<button onclick="borrowItem()">Borrow</button>

<h3>Return Item</h3>
<input type="text" id="returnName" placeholder="Item Name">
<input type="number" id="returnQty" placeholder="Quantity">
<button onclick="returnItem()">Return</button>

<div class="result">
<h2>Inventory List</h2>

<table id="table">
    <tr>
        <th>Item</th>
        <th>Stock</th>
        <th>Status</th>
    </tr>
</table>

</div>

</div>

<script src="script2.js"></script>

</body>
</html>
